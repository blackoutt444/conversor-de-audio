<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <title>Downloader & Conversor 🎶🎶</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');

        body {
            background: radial-gradient(circle at center, #0a0f2c 0%, #0c1c3d 100%);
            color: #00f0ff;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.7rem;
            color: #00f0ff;
            text-shadow: 0 0 8px #00f0ff, 0 0 20px #0088ff;
            margin-bottom: 40px;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8), 0 0 40px rgba(0, 191, 255, 0.8);
        }

        input, select, button {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 2px solid #00f0ff;
            border-radius: 5px;
            background: #222;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
        }

        input::placeholder {
            color: #aaf3ff;
        }

        input:focus, select:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 10px #8a2be2;
        }

        button {
            background: linear-gradient(45deg, #8a2be2, #00bfff);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        button:hover {
            box-shadow: 0 0 20px #8a2be2, 0 0 30px #00bfff;
            transform: scale(1.05);
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #00bfff;
            text-shadow: 0 0 10px #8a2be2;
        }

        a {
            color: #00f0ff;
            text-decoration: underline;
        }

        a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #8a2be2; text-shadow: 0 0 10px #8a2be2;">CONVERSOR DE AUDIO 🎶🎶</h1>
        <p style="color: #00bfff;">Baixe e converta vídeos e áudios facilmente!</p>

        <input type="text" id="url" placeholder="QUAL A PLAY DE HOJE?" />

        <select id="format">
            <option value="mp3">MP3</option>
            <option value="wav">WAV</option>
            <option value="ogg">OGG</option>
            <option value="flac">FLAC</option>
            <option value="aac">AAC</option>
        </select>

        <button onclick="downloadMedia()">📥 Baixar e Converter</button>

        <p id="status"></p>
    </div>

    <script>
        async function downloadMedia() {
            let url = document.getElementById("url").value;
            let format = document.getElementById("format").value;
            let status = document.getElementById("status");

            if (!url) {
                status.innerHTML = "❌ Insira um link válido!";
                return;
            }

            status.innerHTML = "⏳ Processando...";

            try {
                let response = await fetch("https://conversor-de-audio.onrender.com/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url, format })
                });

                let data = await response.json();
                if (data.success) {
                    status.innerHTML = `✅ Download concluído: <a href="${data.file}" download style="color:#8a2be2;">Clique aqui</a>`;
                } else {
                    status.innerHTML = `❌ Erro: ${data.error}`;
                }
            } catch (error) {
                status.innerHTML = "❌ Erro ao conectar ao servidor!";
            }
        }
    </script>
</body>
</html>
